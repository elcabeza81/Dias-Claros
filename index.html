<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dias Claros - MVP</title>
<style>
:root {
  --bg: #0d1117;
  --panel: #151b23;
  --panel-2: #1b222d;
  --line: #303a47;
  --text: #eef4fb;
  --muted: #8fa1b5;
  --gold: #e3b341;
  --papa: #58a6ff;
  --papa-bg: #17283d;
  --mama: #f778a1;
  --mama-bg: #342131;
  --helper: #ff4d57;
  --ok: #3fb950;
  --shadow: 0 18px 50px rgba(0,0,0,.35);
}

* { box-sizing: border-box; }
html, body { min-height: 100%; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Nunito, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
button, input, select, textarea { font: inherit; }
button { cursor: pointer; }

.app {
  width: 100%;
  max-width: 1920px;
  margin: 0 auto;
  padding: 0 12px 22px;
}

@media (min-width: 761px) {
  body { overflow: hidden; }
  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
}

.topbar {
  min-height: 82px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid var(--line);
  margin: 0 -12px 16px;
  padding: 12px 16px;
  background: var(--panel);
}

.brand strong {
  display: block;
  color: var(--gold);
  font-size: 30px;
  font-weight: 900;
  line-height: 1;
}

.brand span {
  display: block;
  color: var(--muted);
  font-size: 12px;
  letter-spacing: .08em;
  margin-top: 7px;
  text-transform: uppercase;
}

.actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.sync-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--muted);
}
.sync-dot.ok { background: var(--ok); }
.sync-dot.busy { background: var(--gold); }
.sync-dot.local { background: var(--muted); }
.sync-dot.err { background: var(--helper); }

.primary-btn, .secondary-btn, .ghost-btn, .icon-btn {
  min-height: 44px;
  border-radius: 8px;
  font-weight: 900;
}

.primary-btn {
  border: 1px solid var(--gold);
  background: var(--gold);
  color: #10151b;
  padding: 0 16px;
}

.secondary-btn {
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--text);
  padding: 0 14px;
}

.ghost-btn {
  border: 1px solid var(--line);
  background: transparent;
  color: var(--muted);
  padding: 0 14px;
}

.summary {
  margin-bottom: 12px;
}

.today-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 16px;
}

.today-card {
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: end;
  gap: 10px 24px;
}

.label {
  color: var(--muted);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: .08em;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.today-owner {
  font-size: clamp(48px, 6vw, 72px);
  font-weight: 950;
  line-height: .95;
}

.owner-papa { color: var(--papa); }
.owner-mama { color: var(--mama); }

.next-line {
  color: var(--text);
  font-size: clamp(18px, 2vw, 28px);
  font-weight: 800;
  line-height: 1.35;
  margin: 0 0 3px;
}

.next-line em {
  color: var(--gold);
  font-style: normal;
}

.change-line {
  color: var(--muted);
  font-size: 14px;
  font-weight: 800;
  line-height: 1.35;
  margin-top: 7px;
}

.history-list {
  display: grid;
  gap: 8px;
  max-height: 146px;
  overflow: auto;
  padding-right: 2px;
}

.history-item {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #111820;
  padding: 10px 12px;
}

.history-item strong {
  display: block;
  font-size: 14px;
}

.history-item span {
  color: var(--muted);
  display: block;
  font-size: 12px;
  line-height: 1.35;
  margin-top: 4px;
}

.empty-state {
  color: var(--muted);
  font-size: 14px;
  padding: 12px 0;
}

.calendar-shell {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
}

@media (min-width: 761px) {
  .summary { flex: 0 0 auto; }
  .calendar-shell {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
}

.calendar-head {
  display: grid;
  grid-template-columns: 66px 1fr 66px;
  align-items: center;
  gap: 12px;
  padding: 14px;
}

.month-title {
  text-align: center;
  font-size: 28px;
  font-weight: 950;
  text-transform: capitalize;
}

.icon-btn {
  width: 66px;
  border: 1px solid var(--line);
  background: #111820;
  color: var(--text);
  font-size: 24px;
}

.calendar {
  border-top: 1px solid var(--line);
}

@media (min-width: 761px) {
  .calendar {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  #calendarBody {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  .week {
    flex: 1 1 0;
    min-height: 0;
  }
}

.days, .week {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
}

.days {
  background: var(--panel-2);
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
  text-align: center;
  text-transform: uppercase;
}

.days div {
  padding: 12px 4px;
}

.week {
  border-top: 1px solid var(--line);
}

.week:first-of-type {
  border-top: 0;
}

.day {
  min-height: 116px;
  border: 0;
  border-right: 1px solid var(--line);
  background: #111820;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 8px;
  padding: 11px 6px 8px;
  position: relative;
}

@media (min-width: 761px) {
  .day {
    min-height: 0;
    justify-content: center;
  }
}

.day:nth-child(7) { border-right: 0; }
.day.owner-papa-bg { background: var(--papa-bg); }
.day.owner-mama-bg { background: var(--mama-bg); }
.day.empty {
  opacity: .18;
  pointer-events: none;
}

.day.today::after {
  content: "";
  position: absolute;
  inset: 7px;
  border: 2px solid var(--gold);
  border-radius: 10px;
  pointer-events: none;
}

.date-num {
  font-size: 18px;
  font-weight: 950;
  line-height: 1;
}

.owner-badge {
  min-width: 28px;
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 16px;
  font-weight: 950;
  line-height: 1;
}

.owner-badge.papa {
  background: rgba(88,166,255,.18);
  color: var(--papa);
}

.owner-badge.mama {
  background: rgba(247,120,161,.18);
  color: var(--mama);
}

.owner-name {
  font-size: 12px;
  font-weight: 950;
  letter-spacing: .04em;
  text-transform: uppercase;
}

.owner-name.papa { color: var(--papa); }
.owner-name.mama { color: var(--mama); }

.hint {
  color: var(--muted);
  font-size: 14px;
  text-align: center;
  padding: 13px 12px;
  border-top: 1px solid var(--line);
}

.legend {
  display: flex;
  align-items: center;
  gap: 20px;
  border-top: 1px solid var(--line);
  padding: 12px 16px;
}

.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: var(--text);
  font-size: 13px;
  font-weight: 900;
}

.legend-dot {
  width: 15px;
  height: 15px;
  border-radius: 4px;
  border: 2px solid currentColor;
}

.legend-item.papa { color: var(--papa); }
.legend-item.mama { color: var(--mama); }
.legend-item.today { color: var(--gold); margin-left: auto; }

.history-section {
  margin-top: 10px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--panel);
  overflow: hidden;
}

.history-section summary {
  min-height: 44px;
  display: flex;
  align-items: center;
  padding: 0 14px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
  letter-spacing: .08em;
  text-transform: uppercase;
  cursor: pointer;
}

.history-section .history-list {
  max-height: 220px;
  padding: 0 14px 14px;
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 20;
  background: rgba(0,0,0,.68);
  align-items: center;
  justify-content: center;
  padding: 18px;
}
.modal.open { display: flex; }

.dialog {
  width: min(100%, 420px);
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 16px;
  box-shadow: var(--shadow);
  padding: 18px;
}

.dialog h2 {
  margin: 0 0 14px;
  font-size: 22px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}

.field label {
  color: var(--muted);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: .08em;
  text-transform: uppercase;
}

.field input, .field select {
  min-height: 46px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #111820;
  color: var(--text);
  padding: 10px 12px;
}

.dialog-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 14px;
}

@media (max-width: 760px) {
  .app { padding: 0 10px 18px; }
  .topbar {
    align-items: flex-start;
    margin-left: -10px;
    margin-right: -10px;
  }
  .brand strong { font-size: 26px; }
  .brand span { font-size: 11px; line-height: 1.25; }
  .actions { gap: 8px; }
  .primary-btn { padding: 0 12px; }
  .summary { grid-template-columns: 1fr; }
  .today-card {
    grid-template-columns: 1fr;
    align-items: start;
  }
  .next-line { margin-top: 0; }
  .calendar-head {
    grid-template-columns: 52px 1fr 52px;
    padding: 10px;
  }
  .icon-btn { width: 52px; }
  .month-title { font-size: 22px; }
  .days div { font-size: 11px; padding: 10px 2px; }
  .day {
    min-height: 78px;
    gap: 6px;
    padding: 8px 3px 6px;
  }
  .date-num { font-size: 14px; }
  .owner-badge { font-size: 12px; min-width: 24px; padding: 4px 7px; }
  .owner-name { font-size: 10px; letter-spacing: 0; }
  .legend { gap: 12px; padding: 11px 12px; }
  .legend-item { font-size: 12px; }
}

@media (max-width: 390px) {
  .topbar { flex-direction: column; }
  .actions { width: 100%; justify-content: space-between; }
  .primary-btn { flex: 1; }
  .day { min-height: 68px; }
  .owner-name { display: none; }
}
</style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div class="brand">
      <strong>Dias Claros</strong>
      <span id="familyName">Acuerdos visuales para padres separados</span>
    </div>
    <div class="actions">
      <span id="syncDot" class="sync-dot local" title="Estado de sincronizacion"></span>
      <button class="primary-btn" onclick="openChangeModal()">Cambiar día</button>
    </div>
  </header>

  <section class="summary">
    <div class="today-card">
      <div>
        <div class="label">Hoy están con</div>
        <div id="todayOwner" class="today-owner">...</div>
      </div>
      <div>
        <div id="nextLine" class="next-line"></div>
        <div id="changeLine" class="change-line"></div>
      </div>
    </div>
  </section>

  <section class="calendar-shell">
    <div class="calendar-head">
      <button class="icon-btn" aria-label="Mes anterior" onclick="moveMonth(-1)">←</button>
      <div id="monthTitle" class="month-title">Mes</div>
      <button class="icon-btn" aria-label="Mes siguiente" onclick="moveMonth(1)">→</button>
    </div>
    <div class="calendar">
      <div class="days">
        <div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
      </div>
      <div id="calendarBody"></div>
    </div>
    <div class="hint">Tocá la P o M para cambiar el turno al instante. El cambio queda asentado en el historial.</div>
    <div class="legend">
      <div class="legend-item papa"><span class="legend-dot"></span>Papá</div>
      <div class="legend-item mama"><span class="legend-dot"></span>Mamá</div>
      <div class="legend-item today"><span class="legend-dot"></span>Hoy</div>
    </div>
  </section>

  <details class="history-section">
    <summary>Historial de cambios</summary>
    <div id="historyList" class="history-list"></div>
  </details>
</main>

<div id="changeModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="changeTitle">
  <form class="dialog" onsubmit="submitManualChange(event)">
    <h2 id="changeTitle">Cambiar día</h2>
    <div class="field">
      <label for="changeDate">Día</label>
      <input id="changeDate" type="date" required>
    </div>
    <div class="field">
      <label for="changeOwner">Ese día queda con</label>
      <select id="changeOwner" required>
        <option value="papa">Papá</option>
        <option value="mama">Mamá</option>
      </select>
    </div>
    <div class="dialog-actions">
      <button class="ghost-btn" type="button" onclick="closeChangeModal()">Cancelar</button>
      <button class="primary-btn" type="submit">Guardar cambio</button>
    </div>
  </form>
</div>

<script>
// Pegar aca la URL del Apps Script comercial cuando este publicado.
// Mientras quede en PEGAR_URL_APPS_SCRIPT, la app funciona como demo local con localStorage.
var API_URL = 'https://script.google.com/macros/s/AKfycbwEbNnyGulUcjH3n7ELbzJ1GKsV5iqa2iXqwkmx7PoZpNLp_SAzsXtAyq-iXexo3Ys_6A/exec';
var USE_API = API_URL.indexOf('PEGAR_URL') === -1;

var MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var DAYS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
var CYCLE_START = new Date(2026, 4, 8).getTime();
var CYCLE = ['mama','mama','mama','papa','papa','mama','mama','papa','papa','papa','mama','mama','papa','papa'];
var ACCESS = getAccessFromUrl();
var state = loadState();
var now = new Date();
var calYear = now.getFullYear();
var calMonth = now.getMonth();

function fallbackState() {
  return {
    currentRole: 'este dispositivo',
    family: {
      id: ACCESS.family || 'demo',
      name: 'Familia demo',
      papaName: 'Papá',
      mamaName: 'Mamá',
      cycleStart: '2026-05-08',
      cycle: CYCLE
    },
    overrides: {},
    history: []
  };
}

function loadState() {
  try {
    var saved = JSON.parse(localStorage.getItem('dias_claros_mvp_directo'));
    return saved || fallbackState();
  } catch (e) {
    return fallbackState();
  }
}

function saveState() {
  localStorage.setItem('dias_claros_mvp_directo', JSON.stringify(state));
}

function getAccessFromUrl() {
  var params = new URLSearchParams(window.location.search);
  return {
    family: params.get('family') || '',
    token: params.get('token') || ''
  };
}

function canUseRemote() {
  return USE_API && ACCESS.family && ACCESS.token;
}

function setSync(mode) {
  var dot = document.getElementById('syncDot');
  if (!dot) return;
  dot.className = 'sync-dot ' + mode;
}

function callAPI(params, cb) {
  if (!canUseRemote()) {
    if (cb) cb(new Error('demo local'));
    return;
  }
  setSync('busy');
  params.family = ACCESS.family;
  params.token = ACCESS.token;
  params.callback = 'dc_cb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
  var callbackName = params.callback;
  var script = document.createElement('script');
  var timeout = setTimeout(function() {
    cleanup();
    setSync('err');
    if (cb) cb(new Error('timeout'));
  }, 15000);

  function cleanup() {
    clearTimeout(timeout);
    try { delete window[callbackName]; } catch (e) { window[callbackName] = undefined; }
    if (script.parentNode) script.parentNode.removeChild(script);
  }

  window[callbackName] = function(data) {
    cleanup();
    if (data && data.error) {
      setSync('err');
      if (cb) cb(new Error(data.error), data);
      return;
    }
    setSync('ok');
    if (cb) cb(null, data);
  };

  var qs = [];
  for (var k in params) {
    if (params.hasOwnProperty(k)) qs.push(encodeURIComponent(k) + '=' + encodeURIComponent(params[k]));
  }
  script.src = API_URL + '?' + qs.join('&');
  script.onerror = function() {
    cleanup();
    setSync('err');
    if (cb) cb(new Error('network'));
  };
  document.head.appendChild(script);
}

function loadRemoteState() {
  if (!canUseRemote()) {
    setSync('local');
    renderAll();
    return;
  }
  callAPI({ action: 'getState' }, function(err, data) {
    if (!err && data && data.state) {
      state = normalizeState(data.state);
      saveState();
    }
    renderAll();
  });
}

function normalizeState(remote) {
  var defaults = fallbackState();
  var remoteFamily = remote.family || {};
  return {
    currentRole: remote.currentRole || state.currentRole || 'este dispositivo',
    family: {
      id: remoteFamily.id || (state.family && state.family.id) || defaults.family.id,
      name: remoteFamily.name || (state.family && state.family.name) || defaults.family.name,
      papaName: normalizeOwnerName(remoteFamily.papaName || (state.family && state.family.papaName) || defaults.family.papaName, 'papa'),
      mamaName: normalizeOwnerName(remoteFamily.mamaName || (state.family && state.family.mamaName) || defaults.family.mamaName, 'mama'),
      cycleStart: normalizeCycleStart(remoteFamily.cycleStart || (state.family && state.family.cycleStart) || defaults.family.cycleStart),
      cycle: Array.isArray(remoteFamily.cycle) && remoteFamily.cycle.length ? remoteFamily.cycle : ((state.family && state.family.cycle) || defaults.family.cycle)
    },
    overrides: remote.overrides || {},
    history: remote.history || []
  };
}

function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function dateKey(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }

function labelOwner(who) {
  if (who === 'papa') return normalizeOwnerName(state.family && state.family.papaName, 'papa');
  if (who === 'mama') return normalizeOwnerName(state.family && state.family.mamaName, 'mama');
  return '';
}

function shortOwner(who) {
  if (who === 'papa') return 'P';
  if (who === 'mama') return 'M';
  return '';
}

function ownerTextClass(who) {
  if (who === 'papa') return 'owner-papa';
  if (who === 'mama') return 'owner-mama';
  return '';
}

function ownerBgClass(who) {
  if (who === 'papa') return 'owner-papa-bg';
  if (who === 'mama') return 'owner-mama-bg';
  return '';
}

function normalizeOwnerName(name, fallback) {
  var raw = String(name || '').trim();
  if (!raw && fallback === 'papa') return 'Papá';
  if (!raw && fallback === 'mama') return 'Mamá';
  var plain = raw.toLowerCase();
  if (plain === 'papa') return 'Papá';
  if (plain === 'mama') return 'Mamá';
  return raw;
}

function normalizeCycleStart(raw) {
  var t = parseDateToTime(raw);
  if (!isNaN(t)) {
    var d = new Date(t);
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }
  return '2026-05-08';
}

function parseDateToTime(raw) {
  if (!raw) return NaN;
  if (Object.prototype.toString.call(raw) === '[object Date]') return raw.getTime();
  var s = String(raw).trim();
  var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(+m[1], +m[2] - 1, +m[3]).getTime();
  var parsed = new Date(s).getTime();
  return parsed;
}

function getCycleStartTime() {
  var raw = state.family && state.family.cycleStart;
  var parsed = parseDateToTime(raw);
  return isNaN(parsed) ? CYCLE_START : parsed;
}

function getCycle() {
  var cycle = state.family && state.family.cycle;
  return Array.isArray(cycle) && cycle.length ? cycle : CYCLE;
}

function getBaseOwner(ds) {
  var cycleStart = getCycleStartTime();
  var cycle = getCycle();
  var parts = ds.split('-');
  var d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  var diff = Math.round((d.getTime() - cycleStart) / 86400000);
  if (isNaN(diff)) return null;
  return cycle[((diff % cycle.length) + cycle.length) % cycle.length] || null;
}

function getOwner(ds) {
  return state.overrides[ds] || getBaseOwner(ds);
}

function nextDifferentOwner(fromDate) {
  var base = getOwner(dateKey(fromDate));
  var d = new Date(fromDate.getTime());
  for (var i = 1; i < 90; i++) {
    d.setDate(d.getDate() + 1);
    var who = getOwner(dateKey(d));
    if (who && who !== base) return { date: new Date(d.getTime()), owner: who, days: i };
  }
  return null;
}

function renderSummary() {
  var familyLabel = document.getElementById('familyName');
  if (familyLabel) familyLabel.textContent = (state.family && state.family.name) || 'Acuerdos visuales para padres separados';

  var today = new Date();
  var who = getOwner(dateKey(today));
  var owner = document.getElementById('todayOwner');
  owner.textContent = who ? labelOwner(who) : 'Sin datos';
  owner.className = 'today-owner ' + (who ? ownerTextClass(who) : '');

  var next = nextDifferentOwner(today);
  var line = document.getElementById('nextLine');
  if (next) {
    var when = next.days === 1 ? 'Mañana' : DAYS[next.date.getDay()] + ' ' + next.date.getDate();
    line.innerHTML = 'Próximo cambio: ' + when + ' con <em>' + labelOwner(next.owner) + '</em>.';
  } else {
    line.textContent = 'No hay cambios próximos cargados.';
  }

  var changeLine = document.getElementById('changeLine');
  var history = state.history || [];
  if (changeLine) {
    if (history.length) {
      var last = history[history.length - 1];
      changeLine.textContent = 'Último registro: ' + formatDate(last.date) + '.';
    } else {
      changeLine.textContent = '';
    }
  }
}

function renderCalendar() {
  document.getElementById('monthTitle').textContent = MONTHS[calMonth] + ' ' + calYear;
  var first = new Date(calYear, calMonth, 1);
  var offset = first.getDay() === 0 ? 6 : first.getDay() - 1;
  var total = new Date(calYear, calMonth + 1, 0).getDate();
  var cells = [];
  for (var i = 0; i < offset; i++) cells.push(null);
  for (var d = 1; d <= total; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  var todayK = dateKey(new Date());
  var html = '';
  for (var r = 0; r < cells.length; r += 7) {
    html += '<div class="week">';
    for (var c = 0; c < 7; c++) {
      var day = cells[r + c];
      if (!day) {
        html += '<button class="day empty" tabindex="-1"></button>';
        continue;
      }
      var ds = calYear + '-' + pad2(calMonth + 1) + '-' + pad2(day);
      var who = getOwner(ds);
      html += '<button class="day ' + ownerBgClass(who) + (ds === todayK ? ' today' : '') + '" onclick="toggleDayOwner(\'' + ds + '\')">';
      html += '<span class="date-num">' + day + '</span>';
      html += '<span class="owner-badge ' + who + '">' + shortOwner(who) + '</span>';
      html += '<span class="owner-name ' + who + '">' + labelOwner(who) + '</span>';
      html += '</button>';
    }
    html += '</div>';
  }
  document.getElementById('calendarBody').innerHTML = html;
}

function renderHistory() {
  var list = document.getElementById('historyList');
  var history = state.history || [];
  if (!history.length) {
    list.innerHTML = '<div class="empty-state">Todavía no hay cambios registrados.</div>';
    return;
  }
  list.innerHTML = history.slice(-8).reverse().map(function(h) {
    return '<div class="history-item">' +
      '<strong>' + (h.action || 'Cambio') + ': ' + formatDate(h.date) + '</strong>' +
      '<span>' + (h.detail || '') + '</span>' +
    '</div>';
  }).join('');
}

function renderAll() {
  renderSummary();
  renderCalendar();
  renderHistory();
}

function moveMonth(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function toggleDayOwner(ds) {
  var current = getOwner(ds);
  var next = current === 'papa' ? 'mama' : 'papa';
  setDayOwner(ds, next);
}

function setDayOwner(ds, owner) {
  if (canUseRemote()) {
    callAPI({ action: 'setDayOwner', date: ds, owner: owner }, function(err, data) {
      if (!err && data && data.state) {
        state = normalizeState(data.state);
        saveState();
      }
      renderAll();
    });
    return;
  }

  state.overrides[ds] = owner;
  if (!state.history) state.history = [];
  state.history.push({
    action: 'Cambio directo',
    date: ds,
    detail: 'Este dispositivo cambió el día para que quede con ' + labelOwner(owner) + '.',
    createdAt: new Date().toISOString()
  });
  saveState();
  renderAll();
}

function openChangeModal() {
  document.getElementById('changeDate').value = dateKey(new Date());
  document.getElementById('changeOwner').value = 'papa';
  document.getElementById('changeModal').className = 'modal open';
}

function closeChangeModal() {
  document.getElementById('changeModal').className = 'modal';
}

function submitManualChange(event) {
  event.preventDefault();
  var ds = document.getElementById('changeDate').value;
  var owner = document.getElementById('changeOwner').value;
  closeChangeModal();
  setDayOwner(ds, owner);
}

function formatDate(ds) {
  if (!ds) return '';
  var parts = String(ds).split('-');
  var d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  return DAYS[d.getDay()] + ' ' + d.getDate() + ' de ' + MONTHS[d.getMonth()];
}

loadRemoteState();
</script>
</body>
</html>
